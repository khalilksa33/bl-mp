apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      containers:
      - name: cloudflared
        image: cloudflare/cloudflared:latest
        command: ["tunnel", "run"]
        env:
        - name: TUNNEL_TOKEN
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: CLOUDFLARE_TUNNEL_TOKEN
