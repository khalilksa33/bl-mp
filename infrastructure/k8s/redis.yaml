apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-cluster
  namespace: production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-cluster
  template:
    metadata:
      labels:
        app: redis-cluster
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis-cluster-internal
  namespace: production
spec:
  ports:
  - port: 6379
  selector:
    app: redis-cluster
