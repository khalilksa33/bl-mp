---
# infrastructure/deploy/playbook.yml
- name: Deploy Marketplace Stack to Host C (k3s)
  hosts: production
  become: yes
  vars:
    project_root: /opt/marketplace
    registry: ghcr.io

  tasks:
    - name: Ensure project k8s directory exists
      file:
        path: "{{ project_root }}/k8s"
        state: directory
        owner: deploy
        group: deploy
        mode: '0755'

    - name: Copy Kubernetes manifests to host
      copy:
        src: ../k8s/
        dest: "{{ project_root }}/k8s/"
        owner: deploy
        group: deploy
        mode: '0644'

    - name: Create docker registry secret for k3s
      command: >
        k3s kubectl create secret docker-registry ghcr-login-secret
        --docker-server={{ registry }}
        --docker-username={{ registry_username }}
        --docker-password={{ registry_password }}
        --docker-email={{ registry_username }}@users.noreply.github.com
        --dry-run=client -o yaml
      register: secret_yaml

    - name: Apply docker registry secret
      command: k3s kubectl apply -f -
      args:
        stdin: "{{ secret_yaml.stdout }}"

    - name: Apply Kubernetes manifests via Kustomize
      command: k3s kubectl apply -k {{ project_root }}/k8s/

    - name: Wait for deployments to be ready
      command: k3s kubectl rollout status deployment/backend --timeout=120s
      
    - name: Wait for frontend deployment to be ready
      command: k3s kubectl rollout status deployment/frontend --timeout=120s
