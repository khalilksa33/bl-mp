# .github/workflows/deploy.yml
name: CI/CD Production GCP Auto-Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy-to-gcp:
    name: Build, Push, and Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate with Google Cloud
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: List and Create Repo
        run: |
          gcloud artifacts repositories list
          gcloud artifacts repositories create gcr.io --repository-format=docker --location=us --description="GCR" || true
      # Configure Docker for Artifact Registry/GCR
      - name: Configure Docker
        run: |
          gcloud auth configure-docker gcr.io --quiet

      # Build and push Backend to GCR
      - name: Build and Push Backend
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-backend:latest ./backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-backend:latest

      # Deploy Backend to Cloud Run
      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marketplace-backend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-backend:latest
          region: us-central1
          flags: --allow-unauthenticated

      # Build and push Frontend to GCR (injecting deployed Backend URL)
      - name: Build and Push Frontend
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-frontend:latest ./frontend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-frontend:latest

      # Deploy Frontend to Cloud Run
      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marketplace-frontend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-frontend:latest
          region: us-central1
          flags: --allow-unauthenticated
