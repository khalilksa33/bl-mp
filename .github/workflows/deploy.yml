# .github/workflows/deploy.yml
name: CI/CD Production Auto-Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push-backend:
    name: Build & Push Backend Microservice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build & Push Backend Image
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/marketplace-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-frontend-cloudflare:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: ./frontend

      - name: Build Pages Project
        run: npm run pages:build
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./frontend/.vercel/output --project-name=marketplace-frontend --branch=main
          workingDirectory: ./frontend

  deploy-backend-to-host-b:
    name: Deploy Backend to Host B (192.168.8.59)
    needs: build-and-push-backend
    runs-on: self-hosted
    steps:
      - name: Checkout Deployment Infrastructure
        uses: actions/checkout@v4

      - name: Run Ansible Deploy Playbook
        run: |
          ansible-playbook -i infrastructure/deploy/hosts.ini infrastructure/deploy/playbook.yml \
            --extra-vars "registry_username=${{ github.actor }} registry_password=${{ secrets.GITHUB_TOKEN }}"
