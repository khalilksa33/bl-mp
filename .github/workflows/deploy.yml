# .github/workflows/deploy.yml
name: CI/CD Production GCP Auto-Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy-to-gcp:
    name: Build, Push, and Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate with Google Cloud using service account JSON key
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Use access token for docker login (most reliable method for GCR)
      - name: Configure Docker for GCR
        run: |
          echo "Logging into GCR using access token..."
          gcloud auth print-access-token | \
            docker login -u oauth2accesstoken --password-stdin https://gcr.io
          echo "Docker configured for gcr.io"

      # ── Backend ──────────────────────────────────────────────
      - name: Build Backend Docker Image
        run: |
          echo "Building backend from ./backend ..."
          docker build --progress=plain \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-backend:latest \
            ./backend
          echo "Backend image built successfully"

      - name: Push Backend Docker Image
        run: |
          echo "Pushing backend to gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-backend:latest ..."
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-backend:latest
          echo "Backend image pushed successfully"

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marketplace-backend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-backend:latest
          region: us-central1
          flags: --allow-unauthenticated

      # ── Frontend ─────────────────────────────────────────────
      - name: Build Frontend Docker Image
        run: |
          echo "Building frontend from ./frontend ..."
          echo "Injecting Backend URL: ${{ steps.deploy-backend.outputs.url }}"
          docker build --progress=plain \
            --build-arg NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }} \
            -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-frontend:latest \
            ./frontend
          echo "Frontend image built successfully"

      - name: Push Frontend Docker Image
        run: |
          echo "Pushing frontend to gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-frontend:latest ..."
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-frontend:latest
          echo "Frontend image pushed successfully"

      - name: Deploy Frontend to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: marketplace-frontend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/marketplace-frontend:latest
          region: us-central1
          flags: --allow-unauthenticated

      # Print final deployed URLs
      - name: Summary
        run: |
          echo "======================================"
          echo "  Deployment Complete!"
          echo "======================================"
          echo "  Backend:  ${{ steps.deploy-backend.outputs.url }}"
          echo "======================================"
