# .github/workflows/deploy.yml
name: CI/CD Production GCP Auto-Deployment

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  deploy-to-gcp:
    name: Deploy to GCP Cloud Run (via Cloud Build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Authenticate with Google Cloud
      - name: Authenticate with GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # Setup gcloud CLI
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # Enable required APIs (idempotent - safe to run every time)
      - name: Enable Required GCP APIs
        run: |
          echo "Enabling Cloud Run, Cloud Build and Artifact Registry APIs..."
          gcloud services enable \
            run.googleapis.com \
            cloudbuild.googleapis.com \
            artifactregistry.googleapis.com \
            --project=${{ secrets.GCP_PROJECT_ID }}

      # ── Backend: deploy directly from source via Cloud Build ──
      # No docker build/push needed - Cloud Build handles it with its own SA
      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        run: |
          echo "Deploying backend from source using Cloud Build..."
          gcloud run deploy marketplace-backend \
            --source ./backend \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --project=${{ secrets.GCP_PROJECT_ID }}

      # Get the backend URL for the frontend build
      - name: Get Backend URL
        id: get-backend-url
        run: |
          BACKEND_URL=$(gcloud run services describe marketplace-backend \
            --region us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="value(status.url)")
          echo "backend_url=$BACKEND_URL" >> $GITHUB_OUTPUT
          echo "Backend deployed at: $BACKEND_URL"

      # ── Frontend: inject backend URL then deploy from source ──
      - name: Deploy Frontend to Cloud Run
        run: |
          echo "Deploying frontend from source using Cloud Build..."
          echo "Backend URL: ${{ steps.get-backend-url.outputs.backend_url }}"
          gcloud run deploy marketplace-frontend \
            --source ./frontend \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --port 3000 \
            --set-env-vars="NEXT_PUBLIC_API_URL=${{ steps.get-backend-url.outputs.backend_url }}" \
            --project=${{ secrets.GCP_PROJECT_ID }}

      # Print deployed URLs
      - name: Print Deployed Service URLs
        run: |
          echo "=============================="
          echo "Deployment complete!"
          echo "=============================="
          gcloud run services list \
            --region us-central1 \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --format="table(SERVICE,URL,LAST_DEPLOYED_BY,LAST_DEPLOYED_AT)"
